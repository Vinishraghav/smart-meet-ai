# Nixpacks configuration for SmartMeet AI

[phases.setup]
nixPkgs = ["python311", "postgresql"]

[phases.build]
cmds = [
  "cd backend",
  "python -m pip install --upgrade pip",
  "pip install -r requirements_railway.txt"
]

[start]
cmd = "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"

[variables]
PORT = "8000"
PYTHON_VERSION = "3.11"
