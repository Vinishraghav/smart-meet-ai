# SmartMeet AI - Railway Automatic Deployment
[build]
builder = "NIXPACKS"

[deploy]
startCommand = "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
PORT = "8000"
PYTHON_VERSION = "3.11"

[services]
[services.web]
[services.web.name]
value = "smart-meet-ai"

[services.web.type]
value = "web"

[services.web.plan]
value = "free"

[services.web.healthcheckPath]
value = "/health"

[services.web.healthcheckTimeout]
value = 100

[services.web.healthcheckInterval]
value = 15

# PostgreSQL Service
[services.database]
[services.database.type]
value = "psql"

[services.database.plan]
value = "free"

[services.database.name]
value = "smart-meet-db"

# Storage for videos
[services.storage]
[services.storage.type]
value = "volume"

[services.storage.name]
value = "smart-meet-videos"

[services.storage.mountPath]
value = "/app/uploads"
