# SmartMeet AI - Railway Automatic Deployment

[build]
builder = "NIXPACKS"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[env]
NODE_ENV = "production"
PYTHON_VERSION = "3.11"

# Backend Service (already deployed)
[services.backend]
[services.backend.name]
value = "smart-meet-ai-backend"

[services.backend.type]
value = "web"

[services.backend.plan]
value = "free"

[services.backend.buildCommand]
value = "cd backend && pip install -r requirements_railway.txt"

[services.backend.startCommand]
value = "cd backend && ./start.sh"

[services.backend.healthCheckPath]
value = "/health"

# Frontend Service (new)
[services.frontend]
[services.frontend.name]
value = "smart-meet-ai-frontend"

[services.frontend.type]
value = "web"

[services.frontend.plan]
value = "free"

[services.frontend.buildCommand]
value = "cd frontend && npm install && npm run build"

[services.frontend.startCommand]
value = "cd frontend && npm run preview"

[services.frontend.healthCheckPath]
value = "/"

# PostgreSQL Service
[services.database]
[services.database.type]
value = "psql"

[services.database.plan]
value = "free"

[services.database.name]
value = "smart-meet-db"

# Storage for videos
[services.storage]
[services.storage.type]
value = "volume"

[services.storage.name]
value = "smart-meet-videos"

[services.storage.mountPath]
value = "/app/uploads"
