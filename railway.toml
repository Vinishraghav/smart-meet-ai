# SmartMeet AI - Railway Automatic Deployment

[build]
builder = "DOCKERFILE"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 30
healthcheckInterval = 30
healthcheckRetries = 3

[env]
PORT = "8000"
PYTHON_VERSION = "3.11"

# Web Service Configuration
[services.web]
[services.web.name]
value = "smart-meet-ai"

[services.web.type]
value = "web"

[services.web.plan]
value = "free"

# PostgreSQL Service
[services.database]
[services.database.type]
value = "psql"

[services.database.plan]
value = "free"

[services.database.name]
value = "smart-meet-db"

# Storage for videos
[services.storage]
[services.storage.type]
value = "volume"

[services.storage.name]
value = "smart-meet-videos"

[services.storage.mountPath]
value = "/app/uploads"
